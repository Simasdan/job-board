services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: job-board-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend/job-board-api/job-board-api/
    ports:
      - "5028:8080"
    environment:
      ConnectionStrings__DefaultConnectionString: "Host=db;Database=job-board-db;Username=postgres;Password=${DB_PASSWORD}"
      JWT__Secret: ${JWT_SECRET}
      JWT__Issuer: "http://localhost:5028"
      JWT__Audience: "User"
    depends_on:
      - db

volumes:
  pgdata: